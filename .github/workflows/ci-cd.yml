name: CI/CD Pipeline

# Déclenche le workflow à chaque push sur la branche main
on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Étape 1 : Télécharger le code
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build backend with Maven
        run: |
          cd springboot/app/
          mvn clean package -DskipTests
      # Étape 2 : Connexion à Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Étape 3 : Build et push backend
      - name: Build Spring Boot backend
        run: |
          cd springboot/app
          mvn clean package
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/springboot-app .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/springboot-app

      # Étape 4 : Build et push frontend
      - name: Build Angular frontend
        run: |
          cd angular-app
          npm install
          npm run build --prod
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/angular-app .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/angular-app

      # Étape 5 : Lancer les conteneurs pour test
      - name: Run Docker Compose
        run: docker-compose up -d
