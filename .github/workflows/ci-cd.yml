name: CI/CD Pipeline

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build backend with Maven
        run: |
          cd springboot/app
          mvn clean package -DskipTests

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Spring Boot backend
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/springboot-app:latest ./springboot/app

      - name: Push Spring Boot backend
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/springboot-app:latest

      - name: Build Angular frontend
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/angular-app:latest ./angular-app

      - name: Push Angular frontend
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/angular-app:latest

      # ⚠️ INSTALLER DOCKER COMPOSE EN PREMIER !
      - name: Install Docker Compose
        run: |
          sudo curl -L "https://github.com/docker/compose/releases/download/v2.24.0/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
          sudo chmod +x /usr/local/bin/docker-compose
          docker-compose --version

      # ENSUITE lancer docker-compose
      - name: Run Docker Compose
        run: docker-compose up -d

      - name: Attendre le démarrage
        run: sleep 15

      - name: Running containers
        run: docker-compose ps

      - name: Show logs
        run: docker-compose logs
