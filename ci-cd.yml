name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:

      # Étape 1 : Récupérer le code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Étape 2 : Installer Java 17
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      # Étape 3 : Compiler le backend avec Maven
      - name: Build backend with Maven
        run: |
          cd springboot/app
          mvn clean package -DskipTests

      # Étape 4 : Connexion à Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Étape 5 : Build image Spring Boot
      - name: Build Spring Boot backend
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/springboot-app:latest ./springboot/app

      # Étape 6 : Push image Spring Boot
      - name: Push Spring Boot backend
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/springboot-app:latest

      # Étape 7 : Build image Angular
      - name: Build Angular frontend
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/angular-app:latest ./angular-app

      # Étape 8 : Push image Angular
      - name: Push Angular frontend
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/angular-app:latest

      # Étape 9 : Installer docker-compose EN PREMIER
      - name: Install Docker Compose
        run: |
          sudo curl -L "https://github.com/docker/compose/releases/download/v2.24.0/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
          sudo chmod +x /usr/local/bin/docker-compose
          docker-compose --version

      # Étape 10 : Lancer l'application
      - name: Run Docker Compose
        run: docker-compose up -d

      # Étape 11 : Attendre que les conteneurs démarrent
      - name: Attendre le démarrage
        run: sleep 15

      # Étape 12 : Vérifier les conteneurs
      - name: Running containers
        run: docker-compose ps

      # Étape 13 : Afficher les logs
      - name: Show logs
        run: docker-compose logs
